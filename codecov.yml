# Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 70%
        threshold: 5%

# Ignore paths from coverage calculation
# GPU-dependent code and platform stubs cannot be unit tested
ignore:
  - "examples/"
  - "internal/platform/"
  - "internal/thread/"
  - "internal/"
  - "gpu/backend/rust/"
  - "gpu/backend/native/"
  - "gpu/"
  - "window/"
  - "input/"
  - "cmd/"
  - "tmp/"
  - "renderer.go"
  - "renderer_rust.go"
  - "renderer_norust.go"

# Go-specific parser settings
parsers:
  go:
    partials_as_hits: false

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false
